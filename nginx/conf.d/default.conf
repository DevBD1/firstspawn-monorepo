# --- 1. PORT 80: TÜM TRAFİĞİ HTTPS'E YÖNLENDİR ---
server {
    listen 80;
    listen [::]:80;
    server_name .firstspawn.com;
    return 301 https://$host$request_uri;
}

# --- 2. PORT 443: API (FastAPI) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.firstspawn.com;

    ssl_certificate /etc/nginx/certs/firstspawn.crt;
    ssl_certificate_key /etc/nginx/certs/firstspawn.key;

    location / {
        auth_basic "Auth needed!";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# --- 3. PORT 443: DB (pgAdmin) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name db.firstspawn.com;

    ssl_certificate /etc/nginx/certs/firstspawn.crt;
    ssl_certificate_key /etc/nginx/certs/firstspawn.key;

    location / {
        proxy_pass http://pgadmin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        proxy_redirect off;
    }
}

# --- 4. PORT 443: LOGS (Dozzle) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name logs.firstspawn.com;

    ssl_certificate /etc/nginx/certs/firstspawn.crt;
    ssl_certificate_key /etc/nginx/certs/firstspawn.key;

    location / {
        auth_basic "Auth needed!";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://dozzle:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}