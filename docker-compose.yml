services:
  postgres:
    image: postgres:16-alpine
    container_name: firstspawn-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-firstspawn}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-firstspawn}
    # Port mapping kaldırıldı (güvenlik için dışarı açmıyoruz)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-firstspawn} -d ${DB_NAME:-firstspawn}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - firstspawn-network

  redis:
    image: redis:7-alpine
    container_name: firstspawn-redis
    restart: always
    # Port mapping kaldırıldı
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - firstspawn-network

  fastapi:
    build:
      context: . # Monorepo kökü (paylaşımlı paketler için önemli)
      dockerfile: src/api/Dockerfile
    container_name: firstspawn-api
    restart: always
    environment:
      API_ENV: production
      # Konteyner isimlerini (postgres/redis) kullanarak iç ağdan bağlanıyoruz
      API_DATABASE_URL: postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      API_REDIS_URL: redis://redis:6379/0
    # ports:
    #   - "80:8000"  <-- Bu satırı sil/yorum satırı yap, dışarıya port açmayacağız
    expose:
      - "8000" # Sadece Docker iç ağında (firstspawn-network) erişilebilir olacak
    # Canlı ortamda kod mount edilmez, imaj içinden okunur
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # IPv6 desteği için [::] kullanımı
    # command: "uvicorn src.api.app.main:app --host :: --port 8000"
    command: "uvicorn app.main:app --app-dir src/api --host :: --port 8000"
    networks:
      - firstspawn-network

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: firstspawn-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@firstspawn.com
      PGADMIN_DEFAULT_PASSWORD: ${DB_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - firstspawn-network

  nginx:
    image: nginx:latest
    container_name: firstspawn-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - firstspawn-network
    depends_on:
      - fastapi
      - pgadmin

  dozzle:
    image: amir20/dozzle:latest
    container_name: firstspawn-dozzle
    environment:
      - DOZZLE_USERNAME=${DOZZLE_USERNAME:-admin}
      - DOZZLE_PASSWORD=${DOZZLE_PASSWORD:-admin}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - firstspawn-network
    restart: always

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:


networks:
  firstspawn-network:
    driver: bridge
    enable_ipv6: true # Docker daemon.json ile uyumlu olması için
