name: firstspawn
services:
  dozzle:
    image: amir20/dozzle:latest
    # Default service (no profile)
    environment:
      - DOZZLE_USERNAME=${DOZZLE_USERNAME:-admin}
      - DOZZLE_PASSWORD=${DOZZLE_PASSWORD:-admin}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles:
      - backend
    environment:
      POSTGRES_USER: ${DB_USER:-firstspawn}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-firstspawn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-firstspawn} -d ${DB_NAME:-firstspawn}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
    restart: on-failure

  pgadmin:
    image: dpage/pgadmin4:8
    profiles:
      - backend # Merged with backend
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@firstspawn.com
      - PGADMIN_DEFAULT_PASSWORD=${DB_PASSWORD:-admin}
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=False
      - PGADMIN_CONFIG_CSRF_CHECK_REFERER=False
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_started
        required: false
    networks:
      - backend-net
    restart: no

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles:
      - backend
    environment:
      API_ENV: ${API_ENV}
      DB_HOST: postgres
      DB_USER: ${DB_USER:-firstspawn}
      DB_PASSWORD: ${DB_PASSWORD:-firstspawn}
      DB_NAME: ${DB_NAME:-firstspawn}
      API_REDIS_URL: redis://redis:6379/0
      API_ADMIN_EMAIL_ALLOWLIST: ${API_ADMIN_EMAIL_ALLOWLIST:-}
      API_COLLECTOR_KEY: ${API_COLLECTOR_KEY:-change_me}
      MAIL_USERNAME: ${MAIL_USERNAME:-admin@firstspawn.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-admin@firstspawn.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SERVER: ${MAIL_SERVER:-mailserver}
      MAIL_STARTTLS: ${MAIL_STARTTLS:-true}
      MAIL_SSL_TLS: ${MAIL_SSL_TLS:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
      - mail-net
    restart: on-failure

  collector:
    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    profiles:
      - workers
    environment:
      COLLECTOR_API_BASE_URL: ${COLLECTOR_API_BASE_URL:-http://api:8000/api/v1}
      API_COLLECTOR_KEY: ${API_COLLECTOR_KEY:-change_me}
      COLLECTOR_PING_INTERVAL_SECONDS: ${COLLECTOR_PING_INTERVAL_SECONDS:-300}
      COLLECTOR_PAYLOAD_INTERVAL_SECONDS: ${COLLECTOR_PAYLOAD_INTERVAL_SECONDS:-1800}
      COLLECTOR_CONCURRENCY: ${COLLECTOR_CONCURRENCY:-10}
      COLLECTOR_TARGET_PAGE_SIZE: ${COLLECTOR_TARGET_PAGE_SIZE:-100}
      COLLECTOR_PROBE_TIMEOUT_MS: ${COLLECTOR_PROBE_TIMEOUT_MS:-5000}
    depends_on:
      api:
        condition: service_started
        required: false
      postgres:
        condition: service_started
        required: false
    expose:
      - "8081"
    networks:
      - backend-net
    restart: on-failure

  scheduler:
    build:
      context: .
      dockerfile: infrastructure/ops/scheduler/Dockerfile
    profiles:
      - workers
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-firstspawn}
      DB_PASSWORD: ${DB_PASSWORD:-firstspawn}
      DB_NAME: ${DB_NAME:-firstspawn}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
      ARCHIVE_AFTER_HOURS: ${ARCHIVE_AFTER_HOURS:-168}
      SCHEDULE_ARCHIVE_INACTIVE: "${SCHEDULE_ARCHIVE_INACTIVE:-0 2 * * *}"
      SCHEDULE_ROLLUP_RETENTION: "${SCHEDULE_ROLLUP_RETENTION:-30 2 * * *}"
      SCHEDULE_PURGE_DELETED_USERS: "${SCHEDULE_PURGE_DELETED_USERS:-0 3 * * *}"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    networks:
      - backend-net
    restart: on-failure

  redis:
    image: redis:7-alpine
    profiles:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-net
    restart: on-failure

  nginx-private:
    image: nginx:latest
    profiles:
      - backend
    environment:
      NGINX_AUTH_USER: ${NGINX_AUTH_USER:-admin}
      NGINX_AUTH_PASS: ${NGINX_AUTH_PASS:-admin}
    ports:
      - "${NGINX_PRIVATE_HOST_PORT:-8080}:80"
    volumes:
      - ./infrastructure/nginx/private/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/generate-htpasswd.sh:/docker-entrypoint.d/40-generate-htpasswd.sh:ro
    networks:
      - backend-net
    depends_on:
      - api
      - dozzle
    restart: unless-stopped

  nginx-public:
    image: nginx:latest
    profiles:
      - frontend
    ports:
      - "${NGINX_PUBLIC_HOST_PORT:-80}:80"
    volumes:
      - ./infrastructure/nginx/public/conf.d:/etc/nginx/conf.d:ro
    networks:
      - frontend-net
    depends_on:
      - public-webapp
    restart: unless-stopped

  public-webapp:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    profiles:
      - frontend
    environment:
      API_BASE_URL: ${WEB_DOCKER_API_BASE_URL:-http://api:8000/api/v1}
      NEXT_PUBLIC_SITE_URL: ${WEB_DOCKER_SITE_URL:-http://web.localhost:8082}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://app.posthog.com}
      NEXT_PUBLIC_LOCK_BETA_ROUTES: ${NEXT_PUBLIC_LOCK_BETA_ROUTES:-false}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    expose:
      - "3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./packages/ui/src:/app/packages/ui/src
    networks:
      - frontend-net
      - backend-net
    restart: no

  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: ${MAILSERVER_HOSTNAME:-mail.firstspawn.com}
    profiles:
      - mail
    ports:
      - "${MAILSERVER_SMTP_PORT:-25}:25"
      - "${MAILSERVER_SUBMISSION_PORT:-587}:587"
      - "${MAILSERVER_SMTPS_PORT:-465}:465"
      - "${MAILSERVER_IMAPS_PORT:-993}:993"
    volumes:
      - ./docker-data/dms/mail-data/:/var/mail/
      - ./docker-data/dms/mail-state/:/var/mail-state/
      - ./docker-data/dms/mail-logs/:/var/log/mail/
      - ./docker-data/dms/config/:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro
    environment:
      ENABLE_RSPAMD: ${MAILSERVER_ENABLE_RSPAMD:-1}
      ENABLE_CLAMAV: ${MAILSERVER_ENABLE_CLAMAV:-0}
      ENABLE_FAIL2BAN: ${MAILSERVER_ENABLE_FAIL2BAN:-1}
      POSTMASTER_ADDRESS: ${MAILSERVER_POSTMASTER_ADDRESS:-postmaster@firstspawn.com}
      SPOOF_PROTECTION: ${MAILSERVER_SPOOF_PROTECTION:-1}
      SSL_TYPE: ${MAILSERVER_SSL_TYPE:-}
      TZ: ${TZ:-UTC}
    cap_add:
      - NET_ADMIN
    networks:
      - mail-net
    restart: on-failure

  roundcube:
    image: roundcube/roundcubemail:latest
    profiles:
      - mail
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=sqlite
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_DEFAULT_HOST=tls://mailserver
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://mailserver
    networks:
      - mail-net
    depends_on:
      - mailserver
    restart: no

  nginx-mail:
    image: nginx:latest
    profiles:
      - mail
    ports:
      - "${NGINX_MAIL_HOST_PORT:-8081}:80"
    volumes:
      - ./infrastructure/nginx/mail/conf.d:/etc/nginx/conf.d:ro
    networks:
      - mail-net
    depends_on:
      - roundcube
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  mail-net:
    driver: bridge
