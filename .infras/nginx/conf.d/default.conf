# Portable local routing (works on any machine with Docker)
# Use:
#   http://api.localhost
#   http://db.localhost
#   http://logs.localhost

server {
    listen 80;
    listen [::]:80;
    server_name api.localhost api.firstspawn.com;
    resolver 127.0.0.11 ipv6=off valid=30s;

    auth_basic "Auth needed!";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Bearer auth routes use Authorization header.
    # Basic Auth also uses Authorization header, so they conflict.
    # Keep Basic Auth for all API routes except Bearer-protected endpoints.
    location = /api/v1/auth/me {
        auth_basic off;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/v1/admin/ {
        auth_basic off;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name db.localhost db.firstspawn.com;
    resolver 127.0.0.11 ipv6=off valid=30s;

    location / {
        set $pgadmin_upstream http://pgadmin:80;
        proxy_pass $pgadmin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name logs.localhost logs.firstspawn.com;
    resolver 127.0.0.11 ipv6=off valid=30s;

    auth_basic "Auth needed!";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        set $dozzle_upstream http://dozzle:8080;
        proxy_pass $dozzle_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 200 "Use api.localhost, db.localhost, or logs.localhost\n";
}
