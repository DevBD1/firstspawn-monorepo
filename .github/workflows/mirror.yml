name: Mirror to GitLab

on: [push]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{secrets.GITLAB_TOKEN}}@gitlab.com/devbd1-group/firstspawn-monorepo.git
          git push gitlab --all
          git push gitlab --tags
