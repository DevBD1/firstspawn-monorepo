name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # Quick checks that should fail fast
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Run linter
        run: pnpm run lint

  # Type checking across all packages
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run typecheck

  # Build all packages to catch build-time errors
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-format, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          # Dummy values for build-time only
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  # Security scan for dependencies
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for lockfile changes
        run: |
          if [ -n "$(git status --porcelain pnpm-lock.yaml)" ]; then
            echo "::warning::Lockfile is out of sync. Run 'pnpm install' to update."
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: firstspawn
          POSTGRES_PASSWORD: firstspawn
          POSTGRES_DB: firstspawn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U firstspawn -d firstspawn"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for PostgreSQL
        run: |
          node --input-type=module -e "import pg from 'pg';
          const { Client } = pg;
          const connectionString = 'postgresql://firstspawn:firstspawn@127.0.0.1:5432/firstspawn';
          let attempt = 0;
          while (attempt < 30) {
            attempt += 1;
            const client = new Client({ connectionString });
            try {
              await client.connect();
              await client.query('select 1');
              await client.end();
              console.log('PostgreSQL is ready');
              process.exit(0);
            } catch (error) {
              await client.end().catch(() => undefined);
              console.log(`PostgreSQL not ready yet (attempt ${attempt}/30)`);
              await new Promise((resolve) => setTimeout(resolve, 2000));
            }
          }
          console.error('PostgreSQL did not become ready in time');
          process.exit(1);"

      - name: Run tests
        run: pnpm run test
        env:
          DB_USER: firstspawn
          DB_PASSWORD: firstspawn
          DB_NAME: firstspawn
          API_DATABASE_URL: postgresql://firstspawn:firstspawn@127.0.0.1:5432/firstspawn
          API_TEST_DATABASE_URL: postgresql://firstspawn:firstspawn@127.0.0.1:5432/firstspawn
