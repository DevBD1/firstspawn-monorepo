server {
    listen 80;
    server_name firstspawn.com www.firstspawn.com;
    resolver 127.0.0.11 valid=30s;

    location / {
        set $public_upstream http://public-webapp:80;
        proxy_pass $public_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name admin.firstspawn.com;
    resolver 127.0.0.11 valid=30s;

    location / {
        set $admin_upstream http://admin-webapp:80;
        proxy_pass $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80 default_server;
    server_name _;
    return 200 "FirstSpawn Public Gateway (Web, Admin)\n";
}
