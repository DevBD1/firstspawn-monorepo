server {
    listen 80;
    server_name web.localhost website.localhost firstspawn.com www.firstspawn.com;
    resolver 127.0.0.11 valid=30s;

    location / {
        set $public_upstream http://public-webapp:3000;
        proxy_pass $public_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name admin.localhost admin.firstspawn.com;
    default_type text/plain;
    return 503 "FirstSpawn admin webapp is not configured in this local Docker stack.\n";
}

server {
    listen 80 default_server;
    server_name _;
    default_type text/html;
    return 200 '<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FirstSpawn Public Gateway</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 40rem; }
    a { display: block; margin: 0.75rem 0; }
  </style>
</head>
<body>
  <h1>FirstSpawn Public Gateway</h1>
  <a href="http://web.localhost:$server_port/">Website</a>
  <p>Admin panel is not configured in this local Docker stack.</p>
</body>
</html>
';
}
