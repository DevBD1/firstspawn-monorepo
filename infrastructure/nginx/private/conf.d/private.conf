server {
    listen 80;
    server_name api.localhost api.firstspawn.com;
    resolver 127.0.0.11 valid=30s;

    auth_basic "Auth needed!";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location = /api/v1/auth/me {
        auth_basic off;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/v1/admin/ {
        auth_basic off;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name db.localhost db.firstspawn.com;
    resolver 127.0.0.11 valid=30s;

    location / {
        set $pgadmin_upstream http://pgadmin:80;
        proxy_pass $pgadmin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

server {
    listen 80;
    server_name logs.localhost logs.firstspawn.com;
    resolver 127.0.0.11 valid=30s;

    auth_basic "Auth needed!";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        set $dozzle_upstream http://dozzle:8080;
        proxy_pass $dozzle_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80 default_server;
    server_name _;
    default_type text/html;
    return 200 '<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FirstSpawn Private Gateway</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 40rem; }
    a { display: block; margin: 0.75rem 0; }
  </style>
</head>
<body>
  <h1>FirstSpawn Private Gateway</h1>
  <a href="http://api.localhost:8080/">API</a>
  <a href="http://db.localhost:8080/">pgAdmin</a>
  <a href="http://logs.localhost:8080/">Dozzle logs</a>
</body>
</html>
';
}
